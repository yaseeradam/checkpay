<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22C55E",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(34, 22, 16, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pin-input:focus {
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<!-- Background Decoration -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-24 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 left-1/4 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
</div>
<!-- Main Container -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center">
<!-- Header -->
<div class="w-full flex items-center justify-between mb-12 px-2">
<button class="flex items-center justify-center size-10 rounded-full bg-white/50 dark:bg-white/10 glass-card">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-200">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">CheckPay</h1>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Welcome Text -->
<div class="text-center mb-10">
<div class="size-20 bg-primary/20 rounded-2xl flex items-center justify-center mx-auto mb-6 glass-card">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1">lock</span>
</div>
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 font-medium">Enter your secure PIN</p>
</div>
<!-- PIN Input Group -->
<div class="flex justify-center gap-3 mb-12">
<input class="pin-input w-12 h-16 text-center text-2xl font-bold rounded-xl border-0 glass-card text-slate-900 dark:text-white focus:ring-2 focus:ring-primary bg-white/40 dark:bg-white/5" maxlength="1" type="password" value="•"/>
<input class="pin-input w-12 h-16 text-center text-2xl font-bold rounded-xl border-0 glass-card text-slate-900 dark:text-white focus:ring-2 focus:ring-primary bg-white/40 dark:bg-white/5" maxlength="1" type="password" value="•"/>
<input class="pin-input w-12 h-16 text-center text-2xl font-bold rounded-xl border-0 glass-card text-slate-900 dark:text-white focus:ring-2 focus:ring-primary bg-white/40 dark:bg-white/5" maxlength="1" type="password" value=""/>
<input class="pin-input w-12 h-16 text-center text-2xl font-bold rounded-xl border-0 glass-card text-slate-900 dark:text-white focus:ring-2 focus:ring-primary bg-white/40 dark:bg-white/5" maxlength="1" type="password" value=""/>
</div>
<!-- Glassmorphism Numpad -->
<div class="grid grid-cols-3 gap-6 w-full px-8">
<!-- Row 1 -->
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">1</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">2</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">3</button>
<!-- Row 2 -->
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">4</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">5</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">6</button>
<!-- Row 3 -->
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">7</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">8</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">9</button>
<!-- Row 4 -->
<button class="flex items-center justify-center h-16 rounded-2xl glass-card text-primary transition-all">
<span class="material-symbols-outlined text-2xl">fingerprint</span>
</button>
<button class="flex items-center justify-center h-16 rounded-2xl text-xl font-semibold glass-card hover:bg-white/80 dark:hover:bg-white/20 transition-all text-slate-800 dark:text-slate-100">0</button>
<button class="flex items-center justify-center h-16 rounded-2xl glass-card text-slate-400 dark:text-slate-500 transition-all">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
<!-- Footer Actions -->
<div class="mt-12 text-center">
<button class="text-primary font-semibold text-sm hover:underline underline-offset-4">Forgot your PIN?</button>
</div>
</div>
<!-- Bottom Action Button (Floating Style) -->
<div class="fixed bottom-8 w-full max-w-xs px-4">
<button class="w-full bg-primary py-4 rounded-xl text-white font-bold shadow-lg shadow-primary/30 hover:shadow-primary/40 active:scale-95 transition-all">
            Unlock Account
        </button>
</div>
</body></html>
