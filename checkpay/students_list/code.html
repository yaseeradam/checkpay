<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#21c45d',
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'full': '9999px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      font-family: 'Manrope', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f9fafb;
    }
    /* Mimic soft tap feedback */
    .tap-feedback:active {
      background-color: #f3f4f6;
      transform: scale(0.98);
      transition: transform 0.1s ease;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">

<button class="p-2 -ml-2 rounded-full tap-feedback" data-purpose="back-button">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>

<svg class="h-5 w-5 text-slate-400" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" fill-rule="evenodd"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-slate-100 border-transparent focus:ring-primary focus:border-primary rounded-full text-sm" placeholder="Search for a student..." type="text"/>
</div>
<!-- END: Search Bar -->
</header>

<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500">CO</div>
<div>
<h3 class="font-semibold text-slate-900 leading-tight">Chinelo Okeke</h3>
<p class="text-xs text-slate-500 uppercase tracking-wider mt-0.5">ID: 2024-012</p>

</div>
<span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full uppercase tracking-wide">Paid</span>
</div>

<div class="bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm tap-feedback border border-slate-50" data-purpose="student-item">

</div>
<span class="px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full uppercase tracking-wide">Unpaid</span>

<div class="bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm tap-feedback border border-slate-50" data-purpose="student-item">
