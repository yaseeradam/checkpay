<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Payment History - CheckPay</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#21c45d',
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'full-custom': '9999px',
          }
        }
      }
    }
  </script>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-layout">
    /* Custom styles for the timeline vertical line */
    .timeline-line {
      position: absolute;
      left: 1.25rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: #f3f4f6;
      z-index: 0;
    }
    
    .timeline-item:last-child .timeline-line {
      display: none;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900 min-h-screen flex flex-col items-center">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-md bg-white min-h-screen flex flex-col shadow-sm">
<!-- BEGIN: Header -->
<header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md px-6 py-8 border-b border-gray-100">
<div class="flex items-center justify-between mb-2">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-gray-100 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<span class="text-xs font-bold uppercase tracking-widest text-gray-400">Payment Records</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<h1 class="text-2xl font-bold text-slate-800" data-purpose="student-name">Alex Thompson</h1>
<p class="text-sm text-gray-500 mt-1">Student ID: #STU-2026-088</p>
</header>
<!-- END: Header -->
<!-- BEGIN: SummaryCard -->
<section class="px-6 py-6" data-purpose="payment-summary">
<div class="bg-primary/10 rounded-[2rem] p-6 flex items-center justify-between border border-primary/20">
<div>
<p class="text-xs font-semibold text-primary uppercase tracking-wide">Status</p>
<p class="text-lg font-bold text-slate-800">Partially Paid</p>
</div>
<div class="text-right">
<p class="text-xs font-semibold text-primary uppercase tracking-wide">Year</p>
<p class="text-lg font-bold text-slate-800">2026</p>
</div>
</div>
</section>
<!-- END: SummaryCard -->
<!-- BEGIN: TimelineSection -->
<section class="flex-1 px-6 pb-12" data-purpose="payment-timeline">
<h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-8">Monthly History</h2>
<div class="relative">
<!-- BEGIN: Timeline Item - April (Unpaid) -->
<div class="timeline-item relative flex gap-6 pb-10">
<div class="timeline-line"></div>
<div class="relative z-10 flex-shrink-0 w-10 h-10 rounded-full bg-gray-100 border-4 border-white flex items-center justify-center shadow-sm">
<div class="w-2.5 h-2.5 rounded-full bg-gray-300"></div>
</div>
<div class="flex-1 pt-1">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-slate-700">April 2026</h3>
<p class="text-sm text-gray-400">Due Date: Apr 05, 2026</p>
</div>
<span class="px-3 py-1 rounded-full bg-gray-100 text-gray-500 text-xs font-bold uppercase tracking-tight">
                ☐ Unpaid
              </span>
</div>
</div>
</div>
<!-- END: Timeline Item -->
<!-- BEGIN: Timeline Item - March (Paid) -->
<div class="timeline-item relative flex gap-6 pb-10">
<div class="timeline-line"></div>
<div class="relative z-10 flex-shrink-0 w-10 h-10 rounded-full bg-primary border-4 border-white flex items-center justify-center shadow-sm">
<svg class="h-5 w-5 text-white" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</div>
<div class="flex-1 pt-1">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-slate-800">March 2026</h3>
<p class="text-sm text-gray-400">Paid on: Mar 02, 2026</p>
</div>
<span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-tight">
                ✓ Paid
              </span>
</div>
</div>
</div>
<!-- END: Timeline Item -->
<!-- BEGIN: Timeline Item - February (Paid) -->
<div class="timeline-item relative flex gap-6 pb-10">
<div class="timeline-line"></div>
<div class="relative z-10 flex-shrink-0 w-10 h-10 rounded-full bg-primary border-4 border-white flex items-center justify-center shadow-sm">
<svg class="h-5 w-5 text-white" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</div>
<div class="flex-1 pt-1">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-slate-800">February 2026</h3>
<p class="text-sm text-gray-400">Paid on: Feb 01, 2026</p>
</div>
<span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-tight">
                ✓ Paid
              </span>
</div>
</div>
</div>
<!-- END: Timeline Item -->
<!-- BEGIN: Timeline Item - January (Paid) -->
<div class="timeline-item relative flex gap-6 pb-10">
<div class="timeline-line"></div>
<div class="relative z-10 flex-shrink-0 w-10 h-10 rounded-full bg-primary border-4 border-white flex items-center justify-center shadow-sm">
<svg class="h-5 w-5 text-white" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</div>
<div class="flex-1 pt-1">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-slate-800">January 2026</h3>
<p class="text-sm text-gray-400">Paid on: Jan 04, 2026</p>
</div>
<span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-tight">
                ✓ Paid
              </span>
</div>
</div>
</div>
<!-- END: Timeline Item -->
</div>
</section>
<!-- END: TimelineSection -->
<!-- BEGIN: FooterAction -->
<footer class="p-6 bg-white border-t border-gray-100 sticky bottom-0">
<button class="w-full bg-primary text-white font-bold py-4 rounded-full-custom shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" fill-rule="evenodd"></path>
</svg>
        Download Full Report
      </button>
</footer>
<!-- END: FooterAction -->
</main>
<!-- END: MainContainer -->
</body></html>
