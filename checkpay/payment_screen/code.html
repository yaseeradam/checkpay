<script data-purpose="tailwind-config">

<style data-purpose="ios-safe-areas">

<script data-purpose="interactivity">
    // Simple state toggle for demo purposes
    document.querySelectorAll('[data-purpose="student-item"] button').forEach(button => {
      button.addEventListener('click', function() {
        const isPaid = this.classList.contains('bg-brand');
        
        if (isPaid) {
          // Change to Unpaid
          this.className = "px-5 py-2 bg-gray-100 text-gray-500 rounded-full text-sm font-bold btn-transition hover:bg-brand/10 hover:text-brand";
          this.innerHTML = "Mark Paid";
        } else {
          // Change to Paid
          this.className = "px-5 py-2 bg-brand text-white rounded-full text-sm font-bold flex items-center space-x-1 btn-transition shadow-lg shadow-brand/20";
          this.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
            <span>Paid</span>
          `;
        }
      });
    });
  </script>
