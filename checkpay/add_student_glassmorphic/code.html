<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(34, 22, 16, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 91, 19, 0.1);
        }
        .soft-gradient {
            background: radial-gradient(circle at 0% 0%, rgba(236, 91, 19, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(236, 91, 19, 0.1) 0%, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen soft-gradient">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto overflow-hidden">
<!-- Header -->
<header class="flex items-center p-6 justify-between z-10">
<button class="flex size-10 items-center justify-center rounded-full bg-white/50 dark:bg-primary/10 text-slate-900 dark:text-slate-100 hover:bg-white/80 transition-all">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Add Student</h1>
<button class="flex size-10 items-center justify-center rounded-full bg-primary text-white shadow-lg shadow-primary/30 hover:scale-105 transition-transform">
<span class="material-symbols-outlined">check</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 px-6 pb-24">
<div class="glass-card rounded-3xl p-8 shadow-2xl space-y-8">
<!-- Profile Upload Section -->
<div class="flex flex-col items-center gap-6">
<div class="relative group">
<div class="bg-primary/10 rounded-full p-1 border-2 border-dashed border-primary/30">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 shadow-inner" data-alt="Close up portrait of a young student" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCWdwyJLSoJAMHvKPhMrYJNXHga0vDFBU5JDa29KoLXDvkbypBIm8q9uhMmJ6p1vu0D2XVUTgbar0HaVFL3UmAj8X8G-kPFAtW8H4dra_p-Tx1-DDKtaUUEmLT2qPEcvi35DPqOAC1FAvZAfThxBhtoLH0efxi_ldVNXv216yNnSrb_vxHxAlJlAPqxP5TrK5wtKVVuyML9d0rBmnAINOMI6uJt4E5Ahd1wvCGh9rOS1QCSgqnTvY35lNIRCfmNt0l4bExQhO0_2NQ");'>
</div>
</div>
<div class="absolute bottom-1 right-1 bg-primary text-white p-2 rounded-full shadow-lg cursor-pointer">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</div>
</div>
<div class="text-center">
<h3 class="text-lg font-semibold">Student Profile</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm">Upload a clear face photo (max 10MB)</p>
</div>
</div>
<!-- Form Fields -->
<div class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold px-1 text-slate-600 dark:text-slate-300">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">person</span>
<input class="w-full bg-white/30 dark:bg-primary/5 border border-white/50 dark:border-primary/20 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter student's full name" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold px-1 text-slate-600 dark:text-slate-300">Student ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">badge</span>
<input class="w-full bg-white/30 dark:bg-primary/5 border border-white/50 dark:border-primary/20 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="e.g. CP-2024-001" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold px-1 text-slate-600 dark:text-slate-300">Class/Grade</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">school</span>
<select class="w-full bg-white/30 dark:bg-primary/5 border border-white/50 dark:border-primary/20 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all appearance-none text-slate-600 dark:text-slate-300">
<option>Select Grade</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold px-1 text-slate-600 dark:text-slate-300">Parent/Guardian Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full bg-white/30 dark:bg-primary/5 border border-white/50 dark:border-primary/20 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="guardian@example.com" type="email"/>
</div>
</div>
</div>
<!-- Secondary Actions -->
<div class="pt-4">
<button class="w-full py-4 text-primary font-bold bg-primary/10 rounded-2xl hover:bg-primary/20 transition-colors border border-primary/20">
                        View Enrollment History
                    </button>
</div>
</div>
</main>
<!-- Navigation Bar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md glass-card rounded-t-3xl p-4 flex justify-around items-center border-b-0 shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.1)]">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1]">group</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Students</span>
</a>
<div class="relative -top-8">
<button class="bg-primary text-white p-4 rounded-full shadow-xl shadow-primary/40 flex items-center justify-center">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Payments</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Settings</span>
</a>
</nav>
</div>
</body></html>
